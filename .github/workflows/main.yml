name: Browser RDP (Chrome Remote Desktop)

on:
  workflow_dispatch:
    inputs:
      crd_command:
        description: 'الصق كود الـ Powershell اللي نسخته من جوجل هنا'
        required: true
      pin:
        description: 'اكتب رقم سري (PIN) من 6 أرقام على الأقل للاتصال (مثال: 123456)'
        required: true
        default: '123456'

jobs:
  rdp-session:
    runs-on: windows-latest
    steps:
      - name: تنزيل وتثبيت Chrome Remote Desktop
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "crd.msi"
          Start-Process -Wait -FilePath msiexec.exe -ArgumentList "/i crd.msi /quiet /qn /norestart"

      - name: تفعيل الـ RDP
        run: |
          ${{ github.event.inputs.crd_command }} -pin=${{ github.event.inputs.pin }}

      - name: الحفاظ على الجلسة (Keep Alive)
        run: |
          Write-Host "الـ RDP جاهز الآن! يمكنك الاتصال من المتصفح."
          Start-Sleep -Seconds 21600
